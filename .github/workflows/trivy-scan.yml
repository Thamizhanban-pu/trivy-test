name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write # Required to upload SARIF results to the GitHub Security Tab

jobs:
  build-and-scan:
    name: Build and Scan Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Local Docker Image
      run: |
        docker build -t localapp:test .

    - name: Run Trivy Vulnerability Scanner (SARIF Output)
      uses: aquasecurity/trivy-action@v0.36.0   # Note the mandatory 'v' prefix
      with:
         image-ref: 'local-test-image:${{ github.sha }}'
         format: 'sarif'
         output: 'trivy-results.sarif'
         severity: 'CRITICAL,HIGH'

    - name: Upload Scan Results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v3
      if: always() # Ensures logs upload even if vulnerabilities break the previous step
      with:
        sarif_file: 'trivy-results.sarif'
